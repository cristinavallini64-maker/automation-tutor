<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speaking Tutor — Conductors & Insulators</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161a24; --surface2: #1e2333;
    --border: #2a3050; --accent: #4fd1c5; --accent2: #f6ad55;
    --danger: #fc8181; --text: #e2e8f0; --muted: #718096;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px; background-image: radial-gradient(ellipse at 20% 20%, rgba(79,209,197,0.07) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, rgba(246,173,85,0.05) 0%, transparent 50%); }
  header { text-align: center; margin-bottom: 20px; }
  header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 800; letter-spacing: -0.03em; color: var(--accent); line-height: 1.1; }
  header p { margin-top: 6px; font-family: 'Space Mono', monospace; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  #questionBadge { margin-top: 8px; font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--accent2); }
  .api-bar { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
  .api-bar label { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
  .api-bar input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'Space Mono', monospace; font-size: 0.78rem; outline: none; }
  .api-bar input:focus { border-color: var(--accent); }
  .api-bar button { background: var(--accent); color: #0d0f14; border: none; border-radius: 8px; padding: 8px 16px; font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .chat-container { width: 100%; max-width: 680px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; height: 400px; margin-bottom: 16px; }
  .chat-log { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .chat-log::-webkit-scrollbar { width: 4px; }
  .chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease both; }
  .msg.tutor { flex-direction: row; }
  .msg.student { flex-direction: row-reverse; }
  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; font-family: 'Space Mono', monospace; }
  .tutor .msg-avatar { background: linear-gradient(135deg, var(--accent), #38b2ac); color: #0d0f14; }
  .student .msg-avatar { background: linear-gradient(135deg, var(--accent2), #ed8936); color: #0d0f14; }
  .msg-bubble { max-width: 78%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.55; }
  .tutor .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 3px; }
  .student .msg-bubble { background: rgba(79,209,197,0.1); border: 1px solid rgba(79,209,197,0.25); border-top-right-radius: 3px; }
  .controls { width: 100%; max-width: 680px; display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
  .btn-mic { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--accent); background: transparent; color: var(--accent); font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .btn-mic.recording { background: rgba(79,209,197,0.15); animation: pulse-ring 1.2s ease infinite; }
  .btn-mic.disabled { opacity: 0.4; pointer-events: none; }
  @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(79,209,197,0.4); } 70% { box-shadow: 0 0 0 14px rgba(79,209,197,0); } 100% { box-shadow: 0 0 0 0 rgba(79,209,197,0); } }
  .btn-help { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid var(--accent2); background: transparent; color: var(--accent2); font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; }
  .btn-help.disabled { opacity: 0.4; pointer-events: none; }
  .btn-reset { padding: 14px 20px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; }
  .btn-reset.disabled { opacity: 0.4; pointer-events: none; }
  .transcript-preview { width: 100%; max-width: 680px; min-height: 36px; background: var(--surface2); border: 1px dashed var(--border); border-radius: 10px; padding: 10px 14px; font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); font-style: italic; }
  .status { width: 100%; max-width: 680px; margin-top: 10px; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--muted); text-align: center; min-height: 18px; }
  .status.active { color: var(--accent); }
  .status.warn { color: var(--accent2); }
  .status.error { color: var(--danger); }
  .typing-indicator { display: flex; gap: 5px; align-items: center; padding: 4px 0; }
  .typing-indicator span { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s ease infinite; opacity: 0.6; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<header>
  <h1>Speaking Tutor</h1>
  <p>Conductors, Insulators &amp; Resistance</p>
  <div id="questionBadge">Enter API key to start</div>
</header>
<div class="api-bar">
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <button onclick="startSession()">Start</button>
</div>
<div class="chat-container">
  <div class="chat-log" id="chatLog">
    <div class="msg tutor"><div class="msg-avatar">T</div>
    <div class="msg-bubble">Enter your API key and press <strong>Start</strong> to begin.</div></div>
  </div>
</div>
<div class="controls">
  <button class="btn-mic disabled" id="btnMic" onclick="toggleMic()">🎙️</button>
  <button class="btn-help disabled" id="btnHelp" onclick="requestHelp()">💡 Help — I'm stuck</button>
  <button class="btn-reset disabled" id="btnReset" onclick="resetSession()">↺ Restart</button>
</div>
<div class="transcript-preview" id="transcriptPreview">Your words will appear here while you speak...</div>
<div class="status" id="status">Enter API key to begin</div>

<script>
const QUESTIONS = [
  { q: "What is electric current?", keys: "flow of electric charge through a material; moves through some materials better than others" },
  { q: "What is a conductor? Give two examples.", keys: "material that allows electric current to flow easily; examples: copper, metals, liquids, gases" },
  { q: "What is an insulator? Give two examples.", keys: "material that resists movement of electric charge; examples: glass, rubber, plastic, wood" },
  { q: "Why are metals good conductors?", keys: "contain many free electrons not attached to atoms, free to move through the material" },
  { q: "Why are insulators important for electrical safety?", keys: "cables covered with insulating material like rubber or plastic; safe to touch even when connected to power" },
  { q: "What is resistance?", keys: "opposition to passage of electric current; electrons collide with atoms; energy converted into heat" },
  { q: "What is the difference between a conductor and an insulator in terms of resistance?", keys: "conductor has low resistance; insulator has high resistance" },
  { q: "What happens to free electrons when a wire is connected to a battery?", keys: "free electrons move through the wire; creates an electric current" }
];

const SYSTEM_PROMPT = `You are an English speaking tutor evaluating a student's spoken answer. The student is an Italian high school student at B1 level.

You receive:
QUESTION: [the question]
KEY IDEAS: [concepts required]
STUDENT SAID: [transcription]

Reply ONLY with valid JSON, no markdown, no text outside the JSON:
{
  "correct": true or false,
  "error_type": "none" | "grammar" | "vocabulary" | "pronunciation",
  "correction": "specific correction text or empty string",
  "message": "one sentence feedback"
}

RULES:

correct: true if student showed understanding of key ideas. Synonyms and paraphrases are FINE.

error_type:
- "none": answer correct, no errors
- "grammar": correct meaning but grammatically wrong (e.g. "electrons is free")
- "vocabulary": wrong word used for a specific term (e.g. "flukes" instead of "flow", nonsense words, wrong technical term)
- "pronunciation": phonetically distorted word in transcription (e.g. "konduktor", "rezistanse")
Report only the most important error. If correct and no errors, use "none".

correction:
- grammar: the correct form. E.g. "Say: electrons ARE free, not electrons IS free."
- vocabulary: the correct word. E.g. "The word is 'flow', not 'flukes'."
- pronunciation: the correct pronunciation. E.g. "The word is pronounced 'con-DUC-tor'."
- none: ""

message:
- correct + no errors: one praise word only. "Great!" / "Exactly!" / "Perfect!" / "Well done!"
- not correct: one short hint with a keyword. E.g. "Think about the word 'charge'."
- has error: just "Almost!" or "Good try!" — the correction field handles the rest.
Never ask a question in message. One sentence only.

Special inputs:
- [SESSION START]: {"correct":false,"error_type":"none","correction":"","message":"Hello! Let's begin."}
- [HELP REQUEST]: {"correct":false,"error_type":"none","correction":"","message":"[one keyword hint]"}
- [SILENCE]: {"correct":false,"error_type":"none","correction":"","message":"Take your time!"}`;

// State
let currentQuestion = 1;
let sessionActive = false;
let apiKey = '';
let recognition = null;
let isRecording = false;
let silenceTimer = null;
let sendTimer = null;
let accumulatedTranscript = '';
const SILENCE_TIMEOUT = 8000;

function startSession() {
  apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey.startsWith('sk-ant-')) { setStatus('Invalid API key', 'error'); return; }
  sessionActive = true;
  currentQuestion = 1;
  updateBadge();
  ['btnMic','btnHelp','btnReset'].forEach(id => document.getElementById(id).classList.remove('disabled'));
  setStatus('Session started — press 🎙️ to speak', 'active');
  callAPI('[SESSION START]', true);
}

function resetSession() {
  if (isRecording) stopRecording(false);
  window.speechSynthesis.cancel();
  sessionActive = false; currentQuestion = 1; accumulatedTranscript = '';
  document.getElementById('chatLog').innerHTML = `<div class="msg tutor"><div class="msg-avatar">T</div><div class="msg-bubble">Session reset. Press <strong>Start</strong> to begin again.</div></div>`;
  ['btnMic','btnHelp','btnReset'].forEach(id => document.getElementById(id).classList.add('disabled'));
  document.getElementById('transcriptPreview').textContent = 'Your words will appear here while you speak...';
  document.getElementById('questionBadge').textContent = 'Enter API key to start';
  setStatus('', '');
}

function updateBadge() {
  document.getElementById('questionBadge').textContent = 'Question ' + currentQuestion + ' of ' + QUESTIONS.length;
}

function toggleMic() {
  if (!sessionActive) return;
  isRecording ? stopRecording(true) : startRecording();
}

function startRecording() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus('Speech recognition not supported — use Chrome', 'error'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-GB';
  recognition.continuous = true;
  recognition.interimResults = true;
  accumulatedTranscript = '';

  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('btnMic').classList.add('recording');
    document.getElementById('btnMic').textContent = '⏹️';
    setStatus('Listening... speak now', 'active');
    silenceTimer = setTimeout(onSilenceTimeout, SILENCE_TIMEOUT);
  };

  recognition.onresult = (event) => {
    clearTimeout(silenceTimer);
    silenceTimer = setTimeout(onSilenceTimeout, SILENCE_TIMEOUT);
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        accumulatedTranscript += event.results[i][0].transcript + ' ';
      } else {
        interim += event.results[i][0].transcript;
      }
    }
    document.getElementById('transcriptPreview').textContent = (accumulatedTranscript + interim).trim() || 'Listening...';
    // Send after 1.5s pause following last final result
    clearTimeout(sendTimer);
    if (accumulatedTranscript.trim()) {
      sendTimer = setTimeout(() => {
        const text = accumulatedTranscript.trim();
        accumulatedTranscript = '';
        stopRecording(false);
        document.getElementById('transcriptPreview').textContent = text;
        callAPI(text, false);
      }, 1500);
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') onSilenceTimeout();
    else { setStatus('Mic error: ' + e.error, 'error'); stopRecording(false); }
  };

  recognition.onend = () => { if (isRecording) { try { recognition.start(); } catch(e) {} } };
  recognition.start();
}

function stopRecording(sendPending) {
  isRecording = false;
  clearTimeout(silenceTimer);
  clearTimeout(sendTimer);
  document.getElementById('btnMic').classList.remove('recording');
  document.getElementById('btnMic').textContent = '🎙️';
  if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(e) {} recognition = null; }
  if (sendPending && accumulatedTranscript.trim()) {
    const text = accumulatedTranscript.trim();
    accumulatedTranscript = '';
    document.getElementById('transcriptPreview').textContent = text;
    callAPI(text, false);
  }
}

function onSilenceTimeout() {
  if (isRecording) { accumulatedTranscript = ''; stopRecording(false); callAPI('[SILENCE]', true); }
}

function requestHelp() {
  if (!sessionActive) return;
  if (isRecording) stopRecording(false);
  addMessage('student', '💡 Help — I\'m stuck!');
  callAPI('[HELP REQUEST]', true);
}

async function callAPI(studentText, isSystemMsg) {
  if (!isSystemMsg) addMessage('student', studentText);
  setStatus('Tutor is thinking...', 'active');
  const typingId = addTypingIndicator();
  const q = QUESTIONS[currentQuestion - 1];
  const prompt = `QUESTION: ${q.q}\nKEY IDEAS: ${q.keys}\nSTUDENT SAID: ${studentText}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 200,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    removeTypingIndicator(typingId);

    if (!res.ok) {
      const err = data?.error?.message || 'API error';
      setStatus('Error: ' + err, 'error');
      addMessage('tutor', '⚠️ ' + err);
      return;
    }

    let raw = (data.content?.[0]?.text || '').replace(/```json|```/g,'').trim();
    let parsed;
    try { parsed = JSON.parse(raw); }
    catch(e) { addMessage('tutor', raw); speakText(raw); setStatus('Your turn — press 🎙️', ''); return; }

    const { correct, error_type, correction, message } = parsed;
    const hasError = error_type && error_type !== 'none';
    let tutorText = '';

    if (isSystemMsg) {
      // Just greet/hint + ask current question
      tutorText = message + ' ' + q.q;
    } else {
      const canAdvance = correct && !hasError;
      if (canAdvance && currentQuestion < QUESTIONS.length) {
        // Correct — move to next question
        tutorText = message;
        currentQuestion++;
        updateBadge();
        tutorText += ' ' + QUESTIONS[currentQuestion - 1].q;
      } else if (canAdvance && currentQuestion === QUESTIONS.length) {
        // All done!
        tutorText = '🎉 ' + message + ' You have completed all 8 questions. Excellent work!';
      } else if (hasError) {
        // Error detected — show correction + repeat SAME question
        tutorText = correction + ' ' + q.q;
      } else {
        // Wrong/incomplete — hint + repeat SAME question
        tutorText = message + ' ' + q.q;
      }
    }

    addMessage('tutor', tutorText);
    speakText(tutorText);
    setStatus('Your turn — press 🎙️ to speak', '');

  } catch(err) {
    removeTypingIndicator(typingId);
    setStatus('Network error: ' + err.message, 'error');
    addMessage('tutor', '⚠️ Connection error.');
  }
}

function speakText(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const clean = text.replace(/[🎉⚠️💡🎙️⏹️↺]/g, '');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'en-GB'; utter.rate = 0.88; utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const voice = voices.find(v => v.lang === 'en-GB' && v.name.includes('Google')) ||
                voices.find(v => v.lang === 'en-GB') ||
                voices.find(v => v.name.includes('Daniel')) ||
                voices.find(v => v.lang.startsWith('en'));
  if (voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}
window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

function addMessage(role, text) {
  const log = document.getElementById('chatLog');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `<div class="msg-avatar">${role==='tutor'?'T':'S'}</div><div class="msg-bubble">${escapeHtml(text).replace(/\n/g,'<br>')}</div>`;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
}

function addTypingIndicator() {
  const log = document.getElementById('chatLog');
  const id = 'typing-' + Date.now();
  const div = document.createElement('div');
  div.className = 'msg tutor'; div.id = id;
  div.innerHTML = `<div class="msg-avatar">T</div><div class="msg-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  log.appendChild(div); log.scrollTop = log.scrollHeight;
  return id;
}

function removeTypingIndicator(id) { const el = document.getElementById(id); if (el) el.remove(); }
function setStatus(msg, type) { const el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + (type||''); }
function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
